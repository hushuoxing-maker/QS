<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古月AI智能体 · 轻奢门头提示词生成器Z</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei";
    background:linear-gradient(135deg,#141e30,#243b55,#0f2027);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:#fff;
}

/* 主卡片 */
.card{
    width:100%;
    max-width:1500px;
    border-radius:30px;
    background:linear-gradient(145deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
    backdrop-filter:blur(30px);
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
}

/* 头部 */
.header{
    padding:30px;
    background:linear-gradient(90deg,#c9a96e,#f5d7a1,#b8965a);
    color:#2b2b2b;
}

.header h1{
    font-size:34px;
    font-weight:800;
}

.header p{
    margin-top:8px;
    opacity:0.8;
}

/* 布局 */
.main{
    display:flex;
}

/* 输入区 */
.left{
    width:380px;
    padding:30px;
    border-right:1px solid rgba(255,255,255,0.08);
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.08);
    color:#fff;
}

input:focus{
    outline:none;
    box-shadow:0 0 0 2px #c9a96e;
}

/* 按钮 */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#c9a96e,#f5d7a1);
    color:#2b2b2b;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(201,169,110,0.6);
}

/* 输出区 */
.right{
    flex:1;
    padding:30px;
    max-height:800px;
    overflow:auto;
}

/* 卡片 */
.item{
    background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
    padding:20px;
    border-radius:20px;
    margin-bottom:15px;
    border:1px solid rgba(255,255,255,0.08);
    position:relative;
    transition:0.3s;
}

.item:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* 复制按钮 */
.copy{
    position:absolute;
    right:15px;
    bottom:15px;
    padding:6px 14px;
    border:none;
    border-radius:8px;
    background:#c9a96e;
    color:#2b2b2b;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <h1>✨古月AI智能体 · 轻奢门头提示词生成器</h1>
        <p>白天正立面 · 高级轻奢 · 20组完全不同 · 可施工落地</p>
    </div>

    <div class="main">
        <div class="left">
            <input id="industry" placeholder="行业类型（如：美容院）">
            <input id="brand" placeholder="品牌名">
            <input id="category" placeholder="主营品类">
            <input id="slogan" placeholder="标语">
            <button onclick="generate()">生成20组提示词</button>
        </div>

        <div class="right" id="output"></div>
    </div>
</div>

<script>
function generate(){
    const industry=document.getElementById("industry").value||"美容院";
    const brand=document.getElementById("brand").value||"赫本美学";
    const category=document.getElementById("category").value||"轻奢美容";
    const slogan=document.getElementById("slogan").value||"精致生活";

    const styles=[
        "黑金轻奢","白金极简","香槟金现代","深灰高级","奶油白极简",
        "岩板轻奢","玻璃通透","金属线条立面","极简留白","镜面反射",
        "暖灰质感","高级米色","奢雅黑白","极简几何","线性灯光",
        "轻奢侘寂","现代轻奢","冷淡风轻奢","高级灰金","低饱和奢感"
    ];

    let html="";

    for(let i=0;i<20;i++){
        let p=`白天自然光，${industry}门头正立面完整展示，正面平视视角，无透视畸变无遮挡。轻奢门头设计，${styles[i]}风格，精致高级，低调奢华，金属质感，简约大气。采用大理石立面、金属线条、不锈钢结构、镜面装饰、亚克力背光字、烤漆板、精工金属字组合。品牌店名“${brand}”结合主营“${category}”与标语“${slogan}”，优雅轻奢字体设计。日间线条灯清晰、暗藏氛围灯、背光字发光层次分明。8K高清商业写实效果图，细节丰富，色彩自然，可直接施工参考。`;

        html+=`
        <div class="item">
            ${p}
            <button class="copy" onclick="copyText(this)">复制</button>
        </div>`;
    }

    document.getElementById("output").innerHTML=html;
}

function copyText(btn){
    const text=btn.parentNode.innerText.replace("复制","");
    navigator.clipboard.writeText(text);
    btn.innerText="已复制";
    setTimeout(()=>btn.innerText="复制",1000);
}
</script>

</body>
</html>
